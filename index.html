<!doctype html>
<html lang="id">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Hitung Mundur</title>

    <style>
      * {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
        font-family: Arial, Helvetica, sans-serif;
      }

      body {
        background: linear-gradient(135deg, #0f172a, #1e3a8a);
        display: flex;
        justify-content: center;
        align-items: center;
        height: 100vh;
        color: #fff;
      }

      .container {
        text-align: center;
      }

      h1 {
        font-size: 42px;
        margin-bottom: 20px;
      }

      .subtitle {
        font-size: 18px;
        margin-bottom: 40px;
        color: #d1d5db;
      }

      .timer {
        display: flex;
        justify-content: center;
        gap: 20px;
        flex-wrap: wrap;
      }

      .box {
        background: rgba(255, 255, 255, 0.1);
        backdrop-filter: blur(8px);
        padding: 20px;
        border-radius: 12px;
        min-width: 120px;
      }

      .number {
        font-size: 48px;
        font-weight: bold;
      }

      .label {
        margin-top: 10px;
        font-size: 16px;
        color: #cbd5e1;
      }

      @media (max-width: 600px) {
        h1 {
          font-size: 32px;
        }

        .number {
          font-size: 36px;
        }

        .box {
          min-width: 90px;
        }
      }
    </style>
  </head>
  <body>
    <div class="container">
      <h1>⏳ INFORMASI</h1>

      <div class="subtitle">Menuju Pengumuman Kelas | Segera Instal Aplikasi Spensaron Hebat</strong></div>

      <div class="timer">
        <div class="box">
          <div id="hours" class="number">00</div>
          <div class="label">Jam</div>
        </div>

        <div class="box">
          <div id="minutes" class="number">00</div>
          <div class="label">Menit</div>
        </div>

        <div class="box">
          <div id="seconds" class="number">00</div>
          <div class="label">Detik</div>
        </div>
      </div>
    </div>

    <script>
      function updateCountdown() {
        const now = new Date();

        let target = new Date();

        target.setHours(21);
        target.setMinutes(0);
        target.setSeconds(0);
        target.setMilliseconds(0);

        // Jika sudah lewat jam 23:55 hari ini,
        // target menjadi besok jam 23:55
        if (now > target) {
          target.setDate(target.getDate() + 1);
        }

        const distance = target - now;

        const hours = Math.floor(
          (distance % (1000 * 60 * 60 * 24)) / (1000 * 60 * 60),
        );
        const minutes = Math.floor((distance % (1000 * 60 * 60)) / (1000 * 60));
        const seconds = Math.floor((distance % (1000 * 60)) / 1000);

        document.getElementById("hours").innerHTML = String(hours).padStart(
          2,
          "0",
        );

        document.getElementById("minutes").innerHTML = String(minutes).padStart(
          2,
          "0",
        );

        document.getElementById("seconds").innerHTML = String(seconds).padStart(
          2,
          "0",
        );
      }

      updateCountdown();
      setInterval(updateCountdown, 1000);
    </script>
  </body>
</html>
